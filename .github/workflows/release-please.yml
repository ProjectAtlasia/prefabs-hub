name: release-please

# Conventional-commit driven releases. Triggered by pushes to master, where release-please operates
# (target-branch). It maintains a Release PR against master that bumps the version across
# build.gradle.kts, settings.gradle.kts and PluginConfig; merging it creates the tag + GitHub
# release, and the publish job builds the jar (from the tag), attaches it and publishes to CurseForge.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # release-please operates on master (the release line); develop is the working branch.
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Build + publish (runs only when a release was just created) ──
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: publish # manual approval before the external CurseForge publish
    env:
      CURSE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      # Build from the tag release-please just created (on master, with the bumped version).
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4

      - name: Build metadata
        id: meta
        run: echo "time=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Latest changelog section (for CurseForge)
        run: awk '/^## /{c++} c==1{print} c==2{exit}' CHANGELOG.md > release-notes.md || echo "Release ${{ needs.release-please.outputs.tag_name }}" > release-notes.md

      - name: Build plugin jar (version comes from the bumped build.gradle.kts on master)
        run: >
          ./gradlew clean shadowJar
          -PhubDefault="${{ secrets.HUB_DEFAULT }}" -PhubTlsDefault=true -PhubAllowInsecure=false
          -PbuildTime=${{ steps.meta.outputs.time }} --no-daemon

      - name: Locate jar
        id: jar
        run: echo "path=$(ls build/libs/prefabs-hub-*.jar)" >> "$GITHUB_OUTPUT"

      - name: Attach jar to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ steps.jar.outputs.path }}

      - name: Publish to CurseForge
        if: env.CURSE_TOKEN != ''
        run: >
          ./gradlew publishCurseforge -PcfPublish
          -PcfChangelog=release-notes.md
          -PhubDefault="${{ secrets.HUB_DEFAULT }}" -PhubTlsDefault=true -PhubAllowInsecure=false
          -PbuildTime=${{ steps.meta.outputs.time }} --no-daemon
