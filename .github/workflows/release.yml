name: release

# Cada push na master gera o jar oficial (hub de produção injetado via secret) e publica uma release.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build metadata
        id: meta
        run: echo "time=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      # Deploy artifact = shadowJar (fat jar with gRPC bundled). The production hub address is
      # injected from the HUB_DEFAULT secret so it is never committed to the source.
      - name: Build plugin jar
        run: >
          ./gradlew clean shadowJar
          -PhubDefault="${{ secrets.HUB_DEFAULT }}"
          -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }}
          --no-daemon

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          files: build/libs/prefabs-hub-*.jar
          generate_release_notes: true
