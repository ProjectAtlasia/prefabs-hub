name: release

# Cada push na master gera o jar oficial (hub de produção injetado via secret), publica uma release
# no GitHub e (se CURSEFORGE_TOKEN estiver setado) sobe o jar no CurseForge.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build metadata
        id: meta
        run: echo "time=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      # Deploy artifact = shadowJar (fat jar with gRPC bundled). The production hub address is
      # injected from the HUB_DEFAULT secret so it is never committed to the source.
      - name: Build plugin jar
        run: >
          ./gradlew clean shadowJar
          -PhubDefault="${{ secrets.HUB_DEFAULT }}"
          -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }}
          --no-daemon

      - name: Locate jar
        id: jar
        run: echo "path=$(ls build/libs/prefabs-hub-*.jar)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true

      # ── CurseForge (só roda se o secret CURSEFORGE_TOKEN estiver setado) ──
      # game_versions exige IDs numéricos do CurseForge; resolvemos os da linha Hytale 0.5.x na hora.
      - name: Resolve Hytale 0.5.x version IDs
        if: env.CF_TOKEN != ''
        id: cfver
        run: |
          set -euo pipefail
          ids=$(curl -fsSL -H "X-Api-Token: $CF_TOKEN" \
            https://hytale.curseforge.com/api/game/versions \
            | jq -r '[.[] | select((.name // "") | startswith("0.5")) | .id] | join(",")')
          echo "Hytale 0.5.x version IDs resolvidos: ${ids:-<vazio>}"
          if [ -z "$ids" ]; then
            echo "::error::Nenhum ID de versão Hytale 0.5.x encontrado no CurseForge. Confira o endpoint/estrutura."
            exit 1
          fi
          echo "ids=$ids" >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        if: env.CF_TOKEN != ''
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: 1563303
          game_endpoint: hytale
          file_path: ${{ steps.jar.outputs.path }}
          game_versions: ${{ steps.cfver.outputs.ids }}
          release_type: release
          display_name: prefabs-hub v${{ vars.PLUGIN_VERSION || '0.1.0' }} (${{ steps.meta.outputs.time }})
          changelog: ${{ github.event.head_commit.message }}
          changelog_type: markdown
