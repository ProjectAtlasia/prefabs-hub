name: release

# Push na master = release real, PORÉM o job 'publish' fica PAUSADO esperando aprovação manual
# (environment 'publish' com required reviewers) antes de subir no GitHub e no CurseForge.
# Dispatch manual = dry-run por padrão: builda e valida, SEM criar release e SEM aprovação.
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + validar apenas (NÃO publica, NÃO pede aprovação)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Dry-run: validação sem publicar nada e sem aprovação ──
  dry-run:
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    env:
      CURSE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build metadata
        id: meta
        run: echo "time=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
      - name: Build plugin jar
        run: >
          ./gradlew clean shadowJar
          -PhubDefault="${{ secrets.HUB_DEFAULT }}" -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }} --no-daemon
      - name: Validate CurseForge (debug, no upload)
        if: env.CURSE_TOKEN != ''
        run: >
          ./gradlew publishCurseforge
          -PhubDefault="${{ secrets.HUB_DEFAULT }}" -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }} --no-daemon
      - name: Summary
        run: echo "DRY-RUN OK — build válido, nada publicado, nenhuma aprovação solicitada."

  # ── Publish: SÓ roda após aprovação manual (environment 'publish') ──
  publish:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    runs-on: ubuntu-latest
    environment: publish
    env:
      CURSE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo p/ gerar o changelog desde a última tag
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4

      - name: Build metadata
        id: meta
        run: echo "time=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            echo "## Changes since $PREV" > changelog.md
            git log --no-merges --pretty=format:'- %s (%h)' "$PREV"..HEAD >> changelog.md
          else
            echo "## Initial release" > changelog.md
            git log --no-merges --pretty=format:'- %s (%h)' >> changelog.md
          fi
          grep -q '^- ' changelog.md || printf '\n- Maintenance release (no new commits)\n' >> changelog.md
          echo "--- changelog ---"; cat changelog.md

      - name: Build plugin jar
        run: >
          ./gradlew clean shadowJar
          -PhubDefault="${{ secrets.HUB_DEFAULT }}" -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }} --no-daemon

      - name: Locate jar
        id: jar
        run: echo "path=$(ls build/libs/prefabs-hub-*.jar)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          body_path: changelog.md
          files: ${{ steps.jar.outputs.path }}

      - name: Publish to CurseForge
        if: env.CURSE_TOKEN != ''
        run: >
          ./gradlew publishCurseforge -PcfPublish
          -PcfChangelog=changelog.md
          -PhubDefault="${{ secrets.HUB_DEFAULT }}" -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }} --no-daemon
