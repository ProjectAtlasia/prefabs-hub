name: release

# Push na master = release real (GitHub release + upload no CurseForge via modpublisher).
# Dispatch manual = dry-run por padrão: builda e valida, SEM criar release em lugar nenhum.
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + validar apenas (NÃO cria release no GitHub nem no CurseForge)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CURSE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v4

      # publish = push na master OU dispatch com dry_run desligado. Dry-run não publica nada.
      - name: Decide publish
        id: gate
        run: echo "publish=${{ github.event_name == 'push' || inputs.dry_run == false }}" >> "$GITHUB_OUTPUT"

      - name: Build metadata
        id: meta
        run: echo "time=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      # Deploy artifact = shadowJar (fat jar with gRPC bundled). The production hub address is
      # injected from the HUB_DEFAULT secret so it is never committed to the source.
      - name: Build plugin jar
        run: >
          ./gradlew clean shadowJar
          -PhubDefault="${{ secrets.HUB_DEFAULT }}"
          -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }}
          --no-daemon

      - name: Locate jar
        id: jar
        run: echo "path=$(ls build/libs/prefabs-hub-*.jar)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.gate.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          name: v${{ vars.PLUGIN_VERSION || '0.1.0' }}-${{ steps.meta.outputs.time }}
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true

      # CurseForge via modpublisher (resolve a versão "0.5" → ID e mira o endpoint Hytale).
      # Sem -PcfPublish, modpublisher roda em DEBUG (valida, não sobe nada) — é o dry-run.
      # Só roda se o secret CURSEFORGE_TOKEN existir.
      - name: ${{ steps.gate.outputs.publish == 'true' && 'Publish to CurseForge' || 'Validate CurseForge (dry-run)' }}
        if: env.CURSE_TOKEN != ''
        run: >
          ./gradlew publishCurseforge
          ${{ steps.gate.outputs.publish == 'true' && '-PcfPublish' || '' }}
          -PhubDefault="${{ secrets.HUB_DEFAULT }}"
          -PhubTlsDefault=true
          -PbuildTime=${{ steps.meta.outputs.time }}
          --no-daemon

      - name: Dry-run summary
        if: steps.gate.outputs.publish != 'true'
        run: |
          echo "DRY-RUN: jar=$(basename '${{ steps.jar.outputs.path }}') — nenhuma release criada (GitHub/CurseForge)."
          echo "CurseForge token presente: ${{ env.CURSE_TOKEN != '' }}"
