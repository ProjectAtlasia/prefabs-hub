syntax = "proto3";

package prefabsuploader.v1;

option go_package = "github.com/projectatlasia/prefabs-uploader/bot/gen/prefabsuploaderv1;prefabsuploaderv1";
option java_multiple_files = true;
option java_package = "dev.atlasia.prefabuploader.grpc";
option java_outer_classname = "PrefabsUploaderProto";

service PrefabsUploader {
  // Persistent bidirectional channel opened by the plugin on startup.
  rpc Connect(stream PluginMessage) returns (stream HubMessage);

  // Requests a pairing code used in Discord to link the two sides.
  rpc RequestSetup(SetupRequest) returns (SetupResponse);

  // Per-player import flow.
  rpc PlayerImport(PlayerImportRequest) returns (PlayerImportResponse);

  // Lists the pending review queue.
  rpc ListPending(ListPendingRequest) returns (ListPendingResponse);
  // Fetches a fresh download URL for a pending item.
  rpc GetPending(GetPendingRequest) returns (GetPendingResponse);
  // Approves or rejects a pending item.
  rpc ResolvePending(ResolvePendingRequest) returns (ResolvePendingResponse);
}

message PluginMessage {
  oneof payload {
    Register register = 1;
    Heartbeat heartbeat = 2;
    PrefabAck prefab_ack = 3;
  }
}

// First message of the stream; identifies the server.
message Register {
  // Stable server identity UUID persisted by the plugin.
  string server_id = 1;
  string plugin_version = 2;
  // Token issued at pairing; empty before pairing.
  string auth_token = 3;
}

message Heartbeat {
  int64 timestamp_ms = 1;
}

// Result of a PrefabPush, correlated by transfer_id.
message PrefabAck {
  string transfer_id = 1;
  string prefab_name = 2;
  bool ok = 3;
  // Reason when ok=false.
  string error = 4;
}

message HubMessage {
  oneof payload {
    ConfigState config_state = 1;
    PrefabPush prefab_push = 2;
    PlayerLinked player_linked = 3;
  }
}

// Sent on the (windowed) stream when a player completes the Discord link, so the plugin can confirm
// it in-game to that player. The plugin matches by player_uuid against its open link windows.
message PlayerLinked {
  string player_uuid = 1;
  string player_name = 2;    // in-game name from the link
  string discord_name = 3;   // Discord username, for the in-game confirmation message
}

// Server configuration state, sent after Register and on every change.
message ConfigState {
  bool configured = 1;
  // Bot install link, always populated.
  string bot_invite_url = 2;
  string guild_id = 3;
  string guild_name = 4;
  string channel_id = 5;
  // Issued at pairing; the plugin persists it and resends it in Register on reconnect.
  string auth_token = 6;
}

// A prefab uploaded via Discord, pushed to the plugin.
message PrefabPush {
  string transfer_id = 1;
  // Name requested by the uploader; the plugin sanitizes and namespaces it before saving.
  string prefab_name = 2;
  bytes data = 3;
  string uploader_discord_id = 4;
  string uploader_name = 5;
  int64 size_bytes = 6;
  // Owner Hytale UUID when the upload came from a linked thread; empty for direct uploads.
  string player_uuid = 7;
  // Owner in-game name from the link; empty for direct uploads.
  string player_name = 8;
}

message SetupRequest {
  string server_id = 1;
  // Player who ran the command; optional, for auditing.
  string requested_by = 2;
}

message SetupResponse {
  // Short code to type in Discord.
  string pairing_code = 1;
  int64 expires_at_ms = 2;
  string bot_invite_url = 3;
}

message PlayerImportRequest {
  string server_id = 1;
  // Player Hytale UUID.
  string player_uuid = 2;
  string player_name = 3;
}

message PlayerImportResponse {
  enum Status {
    UNKNOWN = 0;
    // Account not linked; use link_code in Discord.
    NEEDS_LINK = 1;
    // Private thread created in the uploads channel.
    THREAD_OPENED = 2;
    // Account linked but the player is not in the guild.
    NOT_IN_GUILD = 3;
    // Owner has not configured the uploads channel.
    NO_UPLOADS_CHANNEL = 4;
    // Server not paired with Discord.
    NOT_CONFIGURED = 5;
  }
  Status status = 1;
  // Populated when status=NEEDS_LINK.
  string link_code = 2;
  int64 expires_at_ms = 3;
  // Text ready to display in-game.
  string message = 4;
  // Bot link, useful for NEEDS_LINK/NOT_IN_GUILD.
  string bot_invite_url = 5;
}

message ListPendingRequest {
  string server_id = 1;
  // Pairing token; the hub validates the (server_id, auth_token) pair.
  string auth_token = 2;
}

// A pending item: a .prefab.json attachment awaiting approval, metadata only.
message PendingItem {
  // Stable pending id (the Discord attachment_id).
  string id = 1;
  // File name; the plugin sanitizes it before saving.
  string prefab_name = 2;
  // Discord name of the uploader.
  string uploader_name = 3;
  string uploader_discord_id = 4;
  // Owner Hytale UUID when from a linked thread.
  string player_uuid = 5;
  // Owner in-game name from the link.
  string player_name = 6;
  int64 size_bytes = 7;
  int64 uploaded_at_ms = 8;
}

message ListPendingResponse {
  repeated PendingItem items = 1;
}

message GetPendingRequest {
  string server_id = 1;
  // PendingItem.id.
  string id = 2;
  // Validates the (server_id, auth_token) pair.
  string auth_token = 3;
}

message GetPendingResponse {
  // Fresh short-lived Discord CDN signed URL; the plugin downloads from it and never persists it.
  string download_url = 1;
  string prefab_name = 2;
  int64 size_bytes = 3;
}

message ResolvePendingRequest {
  string server_id = 1;
  string id = 2;
  // true = approved; false = rejected.
  bool approved = 3;
  // Staff who decided; optional, for auditing.
  string resolved_by = 4;
  // Validates the (server_id, auth_token) pair.
  string auth_token = 5;
}

message ResolvePendingResponse {
  bool ok = 1;
  string error = 2;
}
