# SonarQube (Community / self-hosted) config for the Hytale plugin.
# The scan runs in .github/workflows/security.yml when the SONAR_ENABLED repo var is "true"
# and the SONAR_HOST_URL + SONAR_TOKEN secrets are set.
sonar.projectKey=prefabs-uploader-plugin
sonar.projectName=PrefabsUploader Plugin

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=build/classes/java/main
sonar.java.source=25

# Generated gRPC stubs are not our code — exclude from analysis.
sonar.exclusions=build/**,src/main/java/dev/atlasia/prefabuploader/grpc/**

sonar.sourceEncoding=UTF-8
